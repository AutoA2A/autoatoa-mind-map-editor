    <div class="container">
        
<section class="container">
    <h2>热门模板</h2>
    <div id="tmplGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;"></div>
</section>

<section class="container">
    <h2>用户分享的优秀导图</h2>
    <div style="margin-bottom:12px;">
        <input type="file" id="uploadInput" accept=".json" style="display:none;">
        <button id="uploadBtn" style="background-color:#3498db;color:#fff;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;">上传导图</button>
        <span id="uploadMsg" style="margin-left:8px;color:#555;"></span>
    </div>
    <div id="sharedGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;"></div>
</section>

<section class="container">
    <h2>推荐标签</h2>
    <ul id="tagList" style="list-style:none;padding:0;margin:0;display:flex;flex-wrap:gap:8px;"></ul>
</section>

<script>
(function(){
    // 示例思维导图数据结构
    function makeSample(label, childrenLabels){
        return {label:label, children:childrenLabels.map(l=>({label:l}))};
    }
    const sampleTemplates = [
        {id:1,title:"学习笔记",data:makeSample("主题",["概念","举例","总结","参考文献"])},
        {id:2,title:"项目计划",data:makeSample("目标",["里程碑","任务分配","风险","时间表"])},
        {id:3,title:"创意脑暴",data:makeSample("创意点",["灵感1","灵感2","灵感3","后续行动"])},
        {id:4,title:"健康管理",data:makeSample("健康",["饮食","运动","睡眠","心理"])}
    ];

    // 从localStorage读取用户共享导图
    function getShared(){
        const raw = localStorage.getItem('sharedMaps');
        return raw ? JSON.parse(raw) : [];
    }
    function setShared(arr){
        localStorage.setItem('sharedMaps',JSON.stringify(arr));
    }
    function addShared(mapObj){
        const arr = getShared();
        arr.push(mapObj);
        setShared(arr);
        renderShared();
    }
    function deleteShared(id){
        const arr = getShared().filter(m=>m.id!==id);
        setShared(arr);
        renderShared();
    }

    // 生成预览SVG（简单放射布局）
    function previewSvg(data, w=180, h=180){
        const cx = w/2, cy = h/2, rInner = 30, rOuter = 80;
        const children = data.children || [];
        const angleStep = children.length ? (2*Math.PI)/children.length : 0;
        let svg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;
        // 连线
        children.forEach((ch,i)=>{
            const angle = i*angleStep;
            const x1 = cx + rInner*Math.cos(angle);
            const y1 = cy + rInner*Math.sin(angle);
            const x2 = cx + rOuter*Math.cos(angle);
            const y2 = cy + rOuter*Math.sin(angle);
            svg+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#bbb" stroke-width="2"/>`;
        });
        // 中心节点
        svg+=`<circle cx="${cx}" cy="${cy}" r="24" fill="#3498db"/>`;
        svg+=`<text x="${cx}" y="${cy+8}" font-size="14" fill="#fff" text-anchor="middle">${data.label}</text>`;
        // 子节点
        children.forEach((ch,i)=>{
            const angle = i*angleStep;
            const x = cx + rOuter*Math.cos(angle);
            const y = cy + rOuter*Math.sin(angle);
            svg+=`<circle cx="${x}" cy="${y}" r="18" fill="#2ecc71"/>`;
            svg+=`<text x="${x}" y="{y+6}" font-size="12" fill="#fff" text-anchor="middle">${ch.label}</text>`;
        });
        svg+=`</svg>`;
        return svg;
    }

    // 渲染模板卡片
    function renderTemplates(){
        const container = document.getElementById('tmplGrid');
        container.innerHTML='';
        sampleTemplates.forEach(t=>{
            const card = document.createElement('div');
            card.style.background='#f7f7f7';
            card.style.padding='12px';
            card.style.borderRadius='4px';
            card.style.textAlign='center';
            card.style.cursor='pointer';
            card.innerHTML = `
                <div>${previewSvg(t.data,150,150)}</div>
                <h3 style="margin:8px 0 4px;">${t.title}</h3>
                <button style="background-color:#3498db;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;">使用此模板</button>
            `;
            card.querySelector('button').onclick = ()=>{
                localStorage.setItem('currentMindMap',JSON.stringify(t.data));
                location.href='index.html';
            };
            container.appendChild(card);
        });
    }

    // 渲染用户共享卡片
    function renderShared(){
        const container = document.getElementById('sharedGrid');
        container.innerHTML='';
        const shared = getShared();
        if(shared.length===0){
            container.innerHTML = `<p style="text-align:center;color:#999;">暂无用户分享的导图，快来上传第一份吧！</p>`;
            return;
        }
        shared.forEach(m=>{
            const card = document.createElement('div');
            card.style.background='#f7f7f7';
            card.style.padding='12px';
            card.style.borderRadius='4px';
            card.style.position='relative';
            card.style.textAlign='center';
            card.innerHTML = `
                <div>${previewSvg(m.data,150,150)}</div>
                <h3 style="margin:8px 0 4px;">${m.title}</h3>
                <button style="background-color:#3498db;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;margin-right:6px;">使用此导图</button>
                <button style="background-color:#e74c3c;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;">删除</button>
            `;
            const useBtn = card.querySelector('button:nth-of-type(1)');
            const delBtn = card.querySelector('button:nth-of-type(2)');
            useBtn.onclick = ()=>{
                localStorage.setItem('currentMindMap',JSON.stringify(m.data));
                location.href='index.html';
            };
            delBtn.onclick = ()=>{
                if(confirm('确定要删除此分享吗？')){
                    deleteShared(m.id);
                }
            };
            container.appendChild(card);
        });
    }

    // 渲染标签
    function renderTags(){
        const tags = ['#创意','#学习','#工作','#健康','#项目规划','#脑暴'];
        const ul = document.getElementById('tagList');
        ul.innerHTML='';
        tags.forEach(t=>{
            const li = document.createElement('li');
            li.style.background='#ecf0f1';
            li.style.padding='4px 10px';
            li.style.borderRadius='4px';
            li.style.fontSize='14px';
            li.style.cursor='pointer';
            li.textContent = t;
            li.onclick = ()=>{ /* 这里可以做过滤，暂时仅提示 */ alert('点击了标签：'+t); };
            ul.appendChild(li);
        });
    }

    // 上传导图
    document.getElementById('uploadBtn').onclick = ()=>{
        document.getElementById('uploadInput').value=null;
        document.getElementById('uploadInput').click();
    };
    document.getElementById('uploadInput').onchange = e=>{
        const file = e.target.files[0];
        if(!file){ return; }
        const reader = new FileReader();
        reader.onload = ev=>{
            try{
                const data = JSON.parse(ev.target.result);
                // 简单校验
                if(!data || typeof data.label!=='string'){
                    throw new Error('非法导图格式');
                }
                const mapObj = {
                    id: Date.now(),
                    title: file.name.replace(/\.[^/.]+$/, ""),
                    data: data,
                    timestamp: Date.now()
                };
                addShared(mapObj);
                document.getElementById('uploadMsg').textContent='导图已上传并分享！';
                document.getElementById('uploadMsg').style.color='#2ecc71';
            }catch(err){
                document.getElementById('uploadMsg').textContent='上传失败：'+err.message;
                document.getElementById('uploadMsg').style.color='#e74c3c';
            }
        };
        reader.readAsText(file);
    };

    // 初始化
    renderTemplates();
    renderShared();
    renderTags();
})();
</script>
