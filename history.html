<div>
  <h2>历史记录</h2>
  <input type="text" id="searchBox" placeholder="搜索导图名称…">
  <div id="pagination">
    <button id="prevPage" class="btn">上一页</button>
    <span id="pageInfo"></span>
    <button id="nextPage" class="btn">下一页</button>
  </div>
  <div id="historyList"></div>
</div>

<script>
const DB_NAME = 'MindMapDB';
const STORE_NAME = 'mindmaps';
const PAGE_SIZE = 6;

let db = null;
let allItems = [];
let currentPage = 0;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function getAllMindmaps() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function updateMindmap(id, updates) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const req = store.get(id);
    req.onsuccess = () => {
      const obj = req.result;
      if (!obj) { reject(new Error('未找到')); return; }
      Object.assign(obj, updates);
      const upd = store.put(obj);
      upd.onsuccess = () => resolve();
      upd.onerror = () => reject(upd.error);
    };
    req.onerror = () => reject(req.error);
  });
}

function deleteMindmap(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function renderList() {
  const container = document.getElementById('historyList');
  container.innerHTML = '';
  const start = currentPage * PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const pageItems = allItems.slice(start, end);
  if (pageItems.length === 0) {
    const emptyDiv = document.createElement('div');
    emptyDiv.innerHTML = '<div style="text-align: center; padding: 32px;"><p>暂无保存的思维导图，快去 <a href="index.html">创建</a> 吧！</p></div>';
    container.appendChild(emptyDiv);
    return;
  }
  pageItems.forEach(item => {
    const itemDiv = document.createElement('div');
    const nameSpan = document.createElement('strong');
    nameSpan.textContent = item.name;
    itemDiv.appendChild(nameSpan);
    itemDiv.appendChild(document.createElement('br'));
    const openBtn = document.createElement('button');
    openBtn.textContent = '打开';
    openBtn.className = 'btn';
    openBtn.onclick = () => { location.href = `index.html?id=${item.id}`; };
    const renameBtn = document.createElement('button');
    renameBtn.textContent = '重命名';
    renameBtn.className = 'btn';
    renameBtn.style.marginLeft = '8px';
    renameBtn.onclick = () => {
      const newName = prompt('请输入新名称', item.name);
      if (newName !== null && newName.trim() !== '') {
        const trimmed = newName.trim();
        if (trimmed !== item.name) {
          updateMindmap(item.id, { name: trimmed }).then(() => loadAndRender()).catch(e => alert('重命名失败: ' + e));
        }
      }
    };
    const delBtn = document.createElement('button');
    delBtn.textContent = '删除';
    delBtn.className = 'btn';
    delBtn.style.marginLeft = '8px';
    delBtn.onclick = () => {
      if (confirm('确定要删除此导图吗？此操作不可恢复。')) {
        deleteMindmap(item.id).then(() => loadAndRender()).catch(e => alert('删除失败: ' + e));
      }
    };
    itemDiv.appendChild(openBtn);
    itemDiv.appendChild(renameBtn);
    itemDiv.appendChild(delBtn);
    container.appendChild(itemDiv);
  });
  document.getElementById('pageInfo').textContent = `第 ${currentPage + 1} 页 / ${Math.ceil(allItems.length / PAGE_SIZE) || 1} 页`;
  document.getElementById('prevPage').disabled = currentPage === 0;
  document.getElementById('nextPage').disabled = (currentPage + 1) * PAGE_SIZE >= allItems.length;
}

function loadAndRender() {
  getAllMindmaps().then(items => {
    allItems = items.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    const search = document.getElementById('searchBox').value.toLowerCase();
    if (search) {
      allItems = allItems.filter(i => i.name.toLowerCase().includes(search));
    }
    currentPage = 0;
    renderList();
  }).catch(err => {
    console.error(err);
    alert('加载历史记录失败');
  });
}

document.getElementById('searchBox').addEventListener('input', loadAndRender);
document.getElementById('prevPage').addEventListener('click', () => {
  if (currentPage > 0) currentPage--, renderList();
});
document.getElementById('nextPage').addEventListener('click', () => {
  if ((currentPage + 1) * PAGE_SIZE < allItems.length) currentPage++, renderList();
});

openDB().then(database => {
  db = database;
  loadAndRender();
}).catch(err => {
  console.error(err);
  alert('无法打开数据库');
});
</script>
