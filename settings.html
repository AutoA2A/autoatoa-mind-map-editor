    <label for="autosaveInterval">自动保存间隔（秒）</label>

<script>
    // 读取本地存储
    function loadSettings(){
        const stored = localStorage.getItem('mindmapSettings');
        return stored ? JSON.parse(stored) : defaultSettings;
    }

    // 保存到本地存储
    function saveSettings(settings){
        localStorage.setItem('mindmapSettings', JSON.stringify(settings));
    }

    // 应用设置到页面
    function applySettings(settings){
        document.body.style.fontFamily = settings.font;
        if(settings.theme === 'dark'){
            document.documentElement.style.setProperty('--bg','#1f2937');
            document.documentElement.style.setProperty('--text','#f8fafc');
            document.documentElement.style.setProperty('--card','#252526');
            document.documentElement.style.setProperty('--primary','#444');
            document.documentElement.style.setProperty('--secondary','#7c7c7c');
        } else {
            document.documentElement.style.setProperty('--bg','#f9fafb');
            document.documentElement.style.setProperty('--text','#111827');
            document.documentElement.style.setProperty('--card','#ffffff');
            document.documentElement.style.setProperty('--primary','#2563eb');
            document.documentElement.style.setProperty('--secondary','#10b983');
        }
    }

    // 初始化
    const settings = loadSettings();
    applySettings(settings);

    document.getElementById('fontSelect').addEventListener('change', function(){
        settings.font = this.value;
        saveSettings(settings);
        applySettings(settings);
    });

    document.getElementById('themeSelect').addEventListener('change', function(){
        settings.theme = this.value;
        saveSettings(settings);
        applySettings(settings);
    });

    document.getElementById('autosaveInterval').addEventListener('change', function(){
        settings.autosaveInterval = parseInt(this.value);
        saveSettings(settings);
    });

    document.getElementById('saveBtn').addEventListener('click', function(){
        saveSettings(settings);
        alert('设置已保存');
    });
</script>
