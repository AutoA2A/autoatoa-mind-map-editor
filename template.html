<article class="container" style="margin-bottom:16px;">
    <h2>中心双分支</h2>

    </div>
    <p>三个节点垂直排列</p>
    <button style="background-color:#3498db;color:#fff;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;" onclick="location.href='index.html?id=linear-three'">使用此模板</button>

<article class="container" style="margin-bottom:16px;">
    <h2>放射四分支</h2>
    <div style="width:200px;height:200px;margin:0 auto;">
        <svg id="preview-radial-four" width="200" height="200"></svg>
    </div>
    <p>中心节点四周各有一个子节点</p>
    <button style="background-color:#3498db;color:#fff;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;" onclick="location.href='index.html?id=radial-four'">使用此模板</button>
</article>

<script>
const templates = [
    {id:'central-two', title:'中心双分支', nodes:[{id:'n1',label:'中心',cx:150,cy:100,r:20},{id:'n2',label:'子A',cx:50,cy:200,r:20},{id:'n3',label:'子B',cx:250,cy:200,r:20}], edges:[{from:'n1',to:'n2'},{from:'n1',to:'n3'}]},
    {id:'linear-three', title:'线性三节点', nodes:[{id:'n1',label:'顶部',cx:150,cy:80,r:20},{id:'n2',label:'中部',cx:150,cy:180,r:20},{id:'n3',label:'底部',cx:150,cy:280,r:20}], edges:[{from:'n1',to:'n2'},{from:'n2',to:'n3'}]},
    {id:'radial-four', title:'放射四分支', nodes:[{id:'n1',label:'中心',cx:150,cy:150,r:20},{id:'n2',label:'上',cx:150,cy:50,r:20},{id:'n3',label:'左',cx:50,cy:150,r:20},{id:'n4',label:'右',cx:250,cy:150,r:20},{id:'n5',label:'下',cx:150,cy:250,r:20}], edges:[{from:'n1',to:'n2'},{from:'n1',to:'n3'},{from:'n1',to:'n4'},{from:'n1',to:'n5'}]}
];

function drawTemplate(tpl, svg) {
    svg.innerHTML = '';
    const ns = "http://www.w3.org/2000/svg";
    // draw edges
    tpl.edges.forEach(e=>{
        const from = tpl.nodes.find(n=>n.id===e.from);
        const to   = tpl.nodes.find(n=>n.id===e.to);
        const line = document.createElementNS(ns,'line');
        line.setAttribute('x1', from.cx);
        line.setAttribute('y1', from.cy);
        line.setAttribute('x2', to.cx);
        line.setAttribute('y2', to.cy);
        line.setAttribute('stroke','#555');
        line.setAttribute('stroke-width',2);
        svg.appendChild(line);
    });
    // draw nodes
    tpl.nodes.forEach(n=>{
        const circle = document.createElementNS(ns,'circle');
        circle.setAttribute('cx', n.cx);
        circle.setAttribute('cy', n.cy);
        circle.setAttribute('r', n.r);
        circle.setAttribute('fill','#3498db');
        circle.setAttribute('stroke','#fff');
        circle.setAttribute('stroke-width',2);
        svg.appendChild(circle);
        const text = document.createElementNS(ns,'text');
        text.setAttribute('x', n.cx);
        text.setAttribute('y', n.cy+4);
        text.setAttribute('text-anchor','middle');
        text.setAttribute('fill','#fff');
        text.setAttribute('font-size','12px');
        text.textContent = n.label;
        svg.appendChild(text);
    });
}
document.addEventListener('DOMContentLoaded',()=>{
    templates.forEach(t=>{
        const svg = document.getElementById(`preview-${t.id}`);
        if(svg) drawTemplate(t, svg);
    });
});
</script>
